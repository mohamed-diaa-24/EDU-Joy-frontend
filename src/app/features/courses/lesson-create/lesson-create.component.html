<section class="px-2 py-4 sm:px-4 sm:py-6">
  <div class="mx-auto max-w-2xl space-y-6">
    <a
      [routerLink]="['/courses', courseId()]"
      class="inline-flex items-center gap-2 rounded-2xl bg-slate-100 px-4 py-2 text-sm font-bold text-slate-700 shadow transition-all hover:bg-slate-200"
    >
      ← {{ 'LESSONS.BACK_TO_COURSE' | translate }}
    </a>

    <header class="text-start">
      <span
        class="inline-flex rounded-2xl bg-emerald-100 px-4 py-2 text-sm font-bold text-emerald-800"
      >
        {{ 'LESSONS.CREATE_BADGE' | translate }}
      </span>
      <h1 class="mt-3 text-3xl font-black text-violet-800 sm:text-4xl">
        {{ 'LESSONS.CREATE_TITLE' | translate }}
      </h1>
      <p class="mt-2 text-lg text-slate-600">
        {{ 'LESSONS.CREATE_SUBTITLE' | translate }}
      </p>
    </header>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="space-y-5 rounded-3xl border border-violet-100 bg-white p-6 shadow-xl sm:p-8"
    >
      @if (submitError()) {
        <div
          class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-bold text-rose-800"
          role="alert"
        >
          {{ submitError() }}
        </div>
      }

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'LESSONS.FORM_TITLE' | translate }}
        </span>
        <input
          type="text"
          formControlName="title"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-200"
          [class.border-rose-300]="form.controls.title.invalid && form.controls.title.touched"
          [placeholder]="'LESSONS.FORM_TITLE_PH' | translate"
        />
        @if (form.controls.title.hasError('required') && form.controls.title.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'LESSONS.TITLE_REQUIRED' | translate }}
          </span>
        }
      </label>

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'LESSONS.FORM_DESC' | translate }}
        </span>
        <textarea
          formControlName="description"
          rows="4"
          class="w-full resize-y rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-200"
          [placeholder]="'LESSONS.FORM_DESC_PH' | translate"
        ></textarea>
      </label>

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'LESSONS.FORM_VIDEO_URL' | translate }}
        </span>
        <input
          type="url"
          formControlName="videoUrl"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-200"
          [class.border-rose-300]="form.controls.videoUrl.invalid && form.controls.videoUrl.touched"
          [placeholder]="'LESSONS.FORM_VIDEO_PH' | translate"
        />
        @if (form.controls.videoUrl.hasError('required') && form.controls.videoUrl.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'LESSONS.VIDEO_REQUIRED' | translate }}
          </span>
        }
        @if (form.controls.videoUrl.hasError('pattern') && form.controls.videoUrl.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'LESSONS.VIDEO_INVALID' | translate }}
          </span>
        }
      </label>

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'LESSONS.FORM_ORDER' | translate }}
        </span>
        <input
          type="number"
          min="1"
          formControlName="order"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-200"
          [class.border-rose-300]="form.controls.order.invalid && form.controls.order.touched"
        />
        @if (form.controls.order.hasError('required') && form.controls.order.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'LESSONS.ORDER_REQUIRED' | translate }}
          </span>
        }
      </label>

      <div class="flex flex-wrap gap-3 pt-2">
        <button
          type="submit"
          [disabled]="submitting()"
          class="rounded-2xl bg-gradient-to-r from-violet-500 to-sky-500 px-8 py-3 text-base font-bold text-white shadow-lg transition-all hover:scale-[1.02] disabled:cursor-not-allowed disabled:opacity-60"
        >
          @if (submitting()) {
            {{ 'LESSONS.CREATING' | translate }}
          } @else {
            {{ 'LESSONS.SUBMIT' | translate }}
          }
        </button>
        <a
          [routerLink]="['/courses', courseId()]"
          class="inline-flex items-center rounded-2xl border border-slate-200 bg-white px-6 py-3 text-base font-bold text-slate-700 shadow transition-all hover:bg-slate-50"
        >
          {{ 'LESSONS.CANCEL' | translate }}
        </a>
      </div>
    </form>
  </div>
</section>
