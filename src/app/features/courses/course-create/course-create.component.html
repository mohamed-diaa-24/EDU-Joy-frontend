<section class="px-2 py-4 sm:px-4 sm:py-6">
  <div class="mx-auto max-w-2xl space-y-6">
    <a
      routerLink="/courses"
      class="inline-flex items-center gap-2 rounded-2xl bg-slate-100 px-4 py-2 text-sm font-bold text-slate-700 shadow transition-all hover:bg-slate-200"
    >
      ← {{ 'COURSES.BACK_TO_LIST' | translate }}
    </a>

    <header class="text-start">
      <span
        class="inline-flex rounded-2xl bg-emerald-100 px-4 py-2 text-sm font-bold text-emerald-800"
      >
        {{ 'COURSES.CREATE_BADGE' | translate }}
      </span>
      <h1 class="mt-3 text-3xl font-black text-sky-800 sm:text-4xl">
        {{ 'COURSES.CREATE_TITLE' | translate }}
      </h1>
      <p class="mt-2 text-lg text-slate-600">
        {{ 'COURSES.CREATE_SUBTITLE' | translate }}
      </p>
    </header>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="space-y-5 rounded-3xl border border-sky-100 bg-white p-6 shadow-xl sm:p-8"
    >
      @if (submitError()) {
        <div
          class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-bold text-rose-800"
          role="alert"
        >
          {{ submitError() }}
        </div>
      }

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'COURSES.FORM_TITLE' | translate }}
        </span>
        <input
          type="text"
          formControlName="title"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-200"
          [class.border-rose-300]="form.controls.title.invalid && form.controls.title.touched"
          [placeholder]="'COURSES.FORM_TITLE_PH' | translate"
        />
        @if (form.controls.title.hasError('required') && form.controls.title.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'COURSES.TITLE_REQUIRED' | translate }}
          </span>
        }
        @if (form.controls.title.hasError('minlength') && form.controls.title.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'COURSES.TITLE_MIN' | translate }}
          </span>
        }
      </label>

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'COURSES.FORM_DESC' | translate }}
        </span>
        <textarea
          formControlName="description"
          rows="6"
          class="w-full resize-y rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-200"
          [class.border-rose-300]="
            form.controls.description.invalid && form.controls.description.touched
          "
          [placeholder]="'COURSES.FORM_DESC_PH' | translate"
        ></textarea>
        @if (form.controls.description.hasError('required') && form.controls.description.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'COURSES.DESC_REQUIRED' | translate }}
          </span>
        }
        @if (form.controls.description.hasError('minlength') && form.controls.description.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'COURSES.DESC_MIN' | translate }}
          </span>
        }
      </label>

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'COURSES.FORM_IMAGE_FILE' | translate }}
        </span>
        <input
          type="file"
          accept="image/*"
          (change)="onFileSelected($event)"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-200"
        />
        <span class="mt-1 block text-xs text-slate-500">
          {{ 'COURSES.FORM_IMAGE_FILE_HINT' | translate }}
        </span>
      </label>

      <label class="block text-start">
        <span class="mb-1 block text-sm font-bold text-slate-700">
          {{ 'COURSES.FORM_PRICE' | translate }}
        </span>
        <input
          type="number"
          min="0"
          step="0.01"
          formControlName="price"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-start outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-200"
          [class.border-rose-300]="form.controls.price.invalid && form.controls.price.touched"
        />
        <span class="mt-1 block text-xs text-slate-500">
          {{ 'COURSES.PRICE_HINT' | translate }}
        </span>
        @if (form.controls.price.hasError('required') && form.controls.price.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'COURSES.PRICE_REQUIRED' | translate }}
          </span>
        }
        @if (form.controls.price.hasError('min') && form.controls.price.touched) {
          <span class="mt-1 block text-xs font-bold text-rose-600">
            {{ 'COURSES.PRICE_MIN' | translate }}
          </span>
        }
      </label>

      <div class="flex flex-wrap gap-3 pt-2">
        <button
          type="submit"
          [disabled]="submitting()"
          class="rounded-2xl bg-gradient-to-r from-sky-500 to-violet-500 px-8 py-3 text-base font-bold text-white shadow-lg transition-all hover:scale-[1.02] disabled:cursor-not-allowed disabled:opacity-60"
        >
          @if (submitting()) {
            {{ 'COURSES.CREATING' | translate }}
          } @else {
            {{ 'COURSES.SUBMIT' | translate }}
          }
        </button>
        <a
          routerLink="/courses"
          class="inline-flex items-center rounded-2xl border border-slate-200 bg-white px-6 py-3 text-base font-bold text-slate-700 shadow transition-all hover:bg-slate-50"
        >
          {{ 'COURSES.CANCEL' | translate }}
        </a>
      </div>
    </form>
  </div>
</section>
