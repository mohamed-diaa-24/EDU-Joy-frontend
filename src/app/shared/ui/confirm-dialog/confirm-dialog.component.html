@if (open()) {
  <div
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6"
    role="dialog"
    aria-modal="true"
    [attr.aria-busy]="loading()"
  >
    <div
      class="absolute inset-0 bg-slate-900/55 backdrop-blur-sm transition-opacity"
      (click)="onBackdropClick()"
    ></div>

    <div
      class="relative z-10 w-full max-w-md transition-transform duration-200"
      (click)="onPanelClick($event)"
    >
      <div
        class="overflow-hidden rounded-3xl border border-slate-200/80 bg-white shadow-2xl shadow-slate-900/10"
      >
        <div class="border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white px-6 py-5 sm:px-7">
          <div class="flex gap-4 text-start">
            <div
              class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl"
              [class.bg-rose-100]="danger()"
              [class.text-rose-600]="danger()"
              [class.bg-sky-100]="!danger()"
              [class.text-sky-600]="!danger()"
              aria-hidden="true"
            >
              @if (danger()) {
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  />
                </svg>
              } @else {
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                  />
                </svg>
              }
            </div>
            <div class="min-w-0 flex-1 pt-0.5">
              <h2 class="text-lg font-black leading-snug text-slate-900 sm:text-xl">
                {{ titleKey() | translate }}
              </h2>
              <p class="mt-2 text-sm leading-relaxed text-slate-600 sm:text-base">
                {{ messageKey() | translate }}
              </p>
            </div>
          </div>
        </div>

        <div class="flex flex-wrap items-center justify-end gap-3 bg-slate-50/80 px-6 py-4 sm:px-7">
          <button
            type="button"
            (click)="onCancel()"
            [disabled]="loading()"
            class="rounded-2xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-bold text-slate-700 shadow-sm transition-all hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
          >
            {{ cancelKey() | translate }}
          </button>
          <button
            type="button"
            (click)="onConfirm()"
            [disabled]="loading()"
            class="inline-flex min-w-[7rem] items-center justify-center rounded-2xl px-5 py-2.5 text-sm font-bold text-white shadow-lg transition-all hover:scale-[1.02] disabled:cursor-not-allowed disabled:opacity-60"
            [ngClass]="
              danger()
                ? 'bg-gradient-to-r from-rose-500 to-rose-600'
                : 'bg-gradient-to-r from-sky-500 to-violet-500'
            "
          >
            @if (loading()) {
              <span
                class="inline-block h-5 w-5 animate-spin rounded-full border-2 border-white/40 border-t-white"
              ></span>
            } @else {
              {{ confirmKey() | translate }}
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
